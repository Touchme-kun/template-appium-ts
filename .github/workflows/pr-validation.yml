name: PR Validation

on:
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Lint
        run: npm run lint
        continue-on-error: true
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Run Smoke Tests
        env:
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
          BROWSERSTACK_APP_ID: ${{ secrets.BROWSERSTACK_APP_ID }}
          BROWSERSTACK_PLATFORM: android
          TEST_ENV: ci
        run: npm run test:cucumber:smoke:browserstack
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-results
          path: |
            allure-results/
            reports/
            logs/
          retention-days: 7
      
      - name: Comment PR with Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let comment = '### :test_tube: Test Results\n\n';
            
            if (context.payload.pull_request) {
              comment += `**Build**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
              comment += `**Commit**: ${{ github.event.pull_request.head.sha }}\n\n`;
              
              if ('${{ job.status }}' === 'success') {
                comment += ':white_check_mark: All smoke tests passed!\n';
              } else {
                comment += ':x: Some tests failed. Please review the artifacts.\n';
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
